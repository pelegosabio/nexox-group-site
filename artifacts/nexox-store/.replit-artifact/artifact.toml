kind = "web"
previewPath = "/"
title = "Nexox Store"
version = "1.0.0"
id = "artifacts/nexox-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22860

[services.development]
run = "pnpm --filter @workspace/nexox-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexox-store", "run", "build" ]
publicDir = "artifacts/nexox-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22860"
BASE_PATH = "/"
